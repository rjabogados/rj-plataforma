{% load static %}

<header class="top-navbar py-3 px-3 px-md-4 d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center gap-3">
        <button class="btn border-0 d-lg-none rounded-3 sidebar-toggle-trigger" id="btnToggleSidebar" aria-label="Toggle Navigation">
            <i class="bi bi-list fs-3"></i>
        </button>
        <div class="navbar-title-wrapper d-flex align-items-center">
            <i class="bi bi-grid-1x2-fill text-muted me-2 d-none d-md-inline title-decor-icon"></i>
            <h5 class="mb-0 fw-bold navbar-main-title">
                Intranet Organizacional
            </h5>
        </div>
    </div>
    
    <div class="d-flex align-items-center gap-2 gap-md-3">
        <span class="d-none d-lg-inline text-muted small fw-medium">
            ¡Hola, <span class="text-dark fw-bold">{{ request.user.first_name|default:"Usuario" }}</span>!
        </span>

        <span class="badge bg-white text-dark shadow-sm border py-2 rounded-pill px-3 fw-semibold live-date-badge">
            <i class="bi bi-calendar-event me-1 text-primary"></i> 
            <span class="d-none d-sm-inline">{% now "d \d\e F, Y" %}</span>
            <span class="d-inline d-sm-none">{% now "d/m/Y" %}</span>
        </span>

        <a href="{% url 'salir' %}" class="btn quick-logout-btn shadow-sm btn-sm fw-bold rounded-pill px-3" title="Cerrar Sesión Segura">
            <i class="bi bi-power"></i>
        </a>
    </div>
</header>
