{% extends 'intranet/base.html' %}
{% block content %}
<div class="container-fluid" style="max-width: 1200px;">
    <div class="d-flex justify-content-between align-items-end mb-4">
        <div>
            <h3 class="fw-bold text-dark mb-1"><i class="bi bi-airplane-engines-fill text-info"></i> Gestión de Vacaciones</h3>
            <p class="text-muted mb-0">Control de días libres, solicitudes y descansos médicos.</p>
        </div>
        <button class="btn btn-info text-white fw-bold shadow-sm px-4 rounded-pill">
            <i class="bi bi-plus-lg"></i> Nueva Solicitud
        </button>
    </div>

    <div class="card shadow-sm border-0 rounded-4 bg-white">
        <div class="card-body p-5 text-center">
            <i class="bi bi-tools text-muted opacity-50 display-1 mb-3 d-block"></i>
            <h4 class="fw-bold text-dark">Módulo en Construcción</h4>
            <p class="text-muted">Aquí programaremos el calendario de descansos de todo el equipo.</p>
        </div>
    </div>
</div>
{% endblock %}
