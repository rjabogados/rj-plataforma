{% extends 'intranet/base.html' %}

{% block content %}
<div class="container-fluid p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="navbar-main-title fw-bold mb-0">Previsualizar Balotario</h2>
            <span class="text-muted">Revisa las preguntas antes de guardarlas en: {{ evaluacion.titulo }}</span>
        </div>
    </div>

    <form method="POST">
        {% csrf_token %}
        <div class="row">
            {% for p in preguntas %}
            <div class="col-md-6 mb-4">
                <div class="card border-0 shadow-sm rounded-3 h-100">
                    <div class="card-body">
                        <div class="d-flex justify-content-between mb-2">
                            <span class="badge bg-primary">Pregunta {{ forloop.counter }}</span>
                            <div class="input-group input-group-sm w-25">
                                <span class="input-group-text">Pts</span>
                                <input type="number" step="0.5" class="form-control" name="puntos_{{ p.id_temp }}" value="{{ p.puntos }}">
                            </div>
                        </div>
                        
                        <textarea class="form-control fw-bold mb-3" name="enunciado_{{ p.id_temp }}" rows="2" required>{{ p.enunciado }}</textarea>
                        
                        <div class="row g-2">
                            <div class="col-6">
                                <div class="input-group input-group-sm">
                                    <div class="input-group-text bg-light">1</div>
                                    <input type="text" class="form-control" name="opcion_1_{{ p.id_temp }}" value="{{ p.opcion_1 }}" required>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="input-group input-group-sm">
                                    <div class="input-group-text bg-light">2</div>
                                    <input type="text" class="form-control" name="opcion_2_{{ p.id_temp }}" value="{{ p.opcion_2 }}">
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="input-group input-group-sm">
                                    <div class="input-group-text bg-light">3</div>
                                    <input type="text" class="form-control" name="opcion_3_{{ p.id_temp }}" value="{{ p.opcion_3 }}">
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="input-group input-group-sm">
                                    <div class="input-group-text bg-light">4</div>
                                    <input type="text" class="form-control" name="opcion_4_{{ p.id_temp }}" value="{{ p.opcion_4 }}">
                                </div>
                            </div>
                        </div>

                        <div class="mt-3">
                            <label class="form-label small fw-bold text-success mb-1">Opción Correcta:</label>
                            <select class="form-select form-select-sm border-success" name="correcta_{{ p.id_temp }}">
                                <option value="1" {% if p.correcta == '1' %}selected{% endif %}>Opción 1</option>
                                <option value="2" {% if p.correcta == '2' %}selected{% endif %}>Opción 2</option>
                                <option value="3" {% if p.correcta == '3' %}selected{% endif %}>Opción 3</option>
                                <option value="4" {% if p.correcta == '4' %}selected{% endif %}>Opción 4</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>

        <div class="position-sticky bottom-0 bg-white p-3 shadow-lg rounded-top border-top mt-4 d-flex justify-content-end gap-3" style="z-index: 1000;">
            <a href="{% url 'gestor_lms' %}" class="btn btn-outline-danger">Cancelar y Descartar</a>
            <button type="submit" class="btn btn-primary fw-bold px-5">
                <i class="bi bi-save me-2"></i> Inyectar al Examen
            </button>
        </div>
    </form>
</div>
{% endblock %}
