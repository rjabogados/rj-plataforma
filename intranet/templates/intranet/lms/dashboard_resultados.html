{% extends 'intranet/base.html' %}
{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">Dashboard de Evaluaciones | RJ Abogados</h2>
        <a href="{% url 'gestor_lms' %}" class="btn btn-outline-secondary">Volver al Gestor</a>
    </div>

    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card text-white bg-primary shadow-sm h-100">
                <div class="card-body">
                    <h6 class="card-title text-uppercase text-white-50">Cursos Activos</h6>
                    <h2 class="mb-0">{{ total_cursos }}</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-info shadow-sm h-100">
                <div class="card-body">
                    <h6 class="card-title text-uppercase text-white-50">Exámenes Creados</h6>
                    <h2 class="mb-0">{{ total_examenes_creados }}</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-success shadow-sm h-100">
                <div class="card-body">
                    <h6 class="card-title text-uppercase text-white-50">Exámenes Rendidos</h6>
                    <h2 class="mb-0">0 </h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-warning shadow-sm h-100">
                <div class="card-body">
                    <h6 class="card-title text-uppercase text-white-50">Nota Promedio</h6>
                    <h2 class="mb-0">0 </h2>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-white fw-bold">
                    Tasa de Aprobación Global
                </div>
                <div class="card-body">
                    <canvas id="graficoAprobacion"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const ctx = document.getElementById('graficoAprobacion').getContext('2d');
        
        // Estos valores los cambiaremos por las variables de Django luego
        const aprobados = 15; // {{ aprobados }}
        const reprobados = 5; // {{ reprobados }}

        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Aprobados', 'Reprobados'],
                datasets: [{
                    data: [aprobados, reprobados],
                    backgroundColor: [
                        '#198754', // Verde Success de Bootstrap
                        '#dc3545'  // Rojo Danger de Bootstrap
                    ],
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { position: 'bottom' }
                }
            }
        });
    });
</script>
{% endblock %}
