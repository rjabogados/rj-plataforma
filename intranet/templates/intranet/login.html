{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Corporativo - RJ</title>
    
    <link rel="shortcut icon" href="{% static 'img/logo_compacto.png' %}" type="image/png">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body { 
            background-color: #f4f7f6; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card { 
            width: 100%;
            max-width: 420px; 
        }
        .form-control:focus {
            box-shadow: none;
            border-color: #0d6efd;
        }
        /* Clase para controlar el tamaño del logo institucional */
        .login-logo {
            max-width: 180px; /* Puedes subir o bajar este número si lo quieres más grande o pequeño */
            height: auto;
            object-fit: contain;
            display: block;
            margin: 0 auto 1rem auto;
        }
    </style>
</head>
<body>

    <div class="container px-3">
        <div class="card shadow-lg border-0 rounded-4 login-card mx-auto">
            <div class="card-body p-5">
                
                <div class="text-center mb-4">
                    <img src="{% static 'img/logo_completo.png' %}" alt="Logo RJ Abogados" class="login-logo">
                    
                    <h3 class="fw-bold text-dark mb-1">Intranet RJ</h3>
                    <p class="text-muted small">Plataforma de Gestión Humana y Operaciones</p>
                </div>

                {% if form.errors %}
                    <div class="alert alert-danger small rounded-3 border-0 fw-bold d-flex align-items-center mb-4">
                        <i class="bi bi-exclamation-triangle-fill fs-5 me-2"></i> 
                        Usuario o contraseña incorrectos.
                    </div>
                {% endif %}

                <form method="POST" action="{% url 'login' %}">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">Nombre de Usuario</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-person-fill"></i></span>
                            <input type="text" name="username" class="form-control form-control-lg bg-light border-start-0 ps-0" placeholder="Usuario" required autofocus>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-muted">Contraseña</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-key-fill"></i></span>
                            <input type="password" name="password" class="form-control form-control-lg bg-light border-start-0 ps-0" placeholder="Contraseña" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold rounded-pill shadow-sm">
                        Ingresar al Sistema <i class="bi bi-box-arrow-in-right ms-1"></i>
                    </button>
                </form>

            </div>
        </div>
        
        <div class="text-center mt-4">
            <p class="text-muted small">© {% now "Y" %} RJ Abogados. Todos los derechos reservados.</p>
        </div>
    </div>

</body>
</html>
