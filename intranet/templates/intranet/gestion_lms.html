{% extends 'intranet/base.html' %}
{% block content %}
<div class="container-fluid">
    <h3 class="fw-bold mb-4"><i class="bi bi-gear-wide-connected text-primary"></i> Gestión de Capacitaciones y Beneficios</h3>
    
    <div class="row">
        <div class="col-md-6 mb-4">
            <div class="card shadow-sm border-0 rounded-4 h-100">
                <div class="card-header bg-dark text-white fw-bold border-0 pt-3"><i class="bi bi-mortarboard-fill text-warning"></i> Nuevo Módulo LMS</div>
                <div class="card-body p-4">
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="fw-bold small">Título del Manual o Curso</label>
                            <input type="text" class="form-control" name="titulo" required>
                        </div>
                        <div class="mb-3">
                            <label class="fw-bold small">Estrellas RJ de Premio</label>
                            <input type="number" class="form-control" name="estrellas_premio" value="50" required>
                        </div>
                        <div class="mb-3">
                            <label class="fw-bold small">Contenido del Manual</label>
                            <textarea class="form-control" name="documento" rows="4" required></textarea>
                        </div>
                        <button type="submit" name="crear_curso" class="btn btn-primary w-100 fw-bold">Publicar Curso</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-6 mb-4">
            <div class="card shadow-sm border-0 rounded-4 h-100">
                <div class="card-header bg-white text-dark border-bottom fw-bold pt-3"><i class="bi bi-gift-fill text-success"></i> Nuevo Beneficio de Canje</div>
                <div class="card-body p-4">
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="fw-bold small">Nombre del Premio (Ej: Gift Card S/100)</label>
                            <input type="text" class="form-control" name="nombre" required>
                        </div>
                        <div class="mb-3">
                            <label class="fw-bold small">Costo en Estrellas RJ</label>
                            <input type="number" class="form-control" name="costo_estrellas" value="1000" required>
                        </div>
                        <div class="mb-3">
                            <label class="fw-bold small">Breve Descripción</label>
                            <textarea class="form-control" name="descripcion" rows="4"></textarea>
                        </div>
                        <button type="submit" name="crear_beneficio" class="btn btn-dark w-100 fw-bold">Agregar al Catálogo</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
