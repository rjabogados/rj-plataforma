{% extends 'intranet/base.html' %}
{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold text-dark mb-0"><i class="bi bi-file-earmark-word-fill text-primary"></i> Biblioteca de Plantillas</h4>
        </div>
        <a href="{% url 'documentos_admin' %}" class="btn btn-outline-primary btn-sm fw-bold rounded-pill">Volver</a>
    </div>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card shadow-sm border-0 rounded-4 p-4">
                <h5 class="fw-bold mb-4 text-dark">Subir Formato</h5>
                <form method="POST" enctype="multipart/form-data" action="{% url 'gestionar_plantillas' %}">
                    {% csrf_token %}
                    <input type="text" class="form-control mb-3" name="nombre" placeholder="Nombre" required>
                    <select class="form-select mb-3" name="categoria_id" required>
                        {% for cat in categorias %}<option value="{{ cat.id }}">{{ cat.nombre }}</option>{% endfor %}
                    </select>
                    <input type="file" class="form-control mb-4" name="archivo_word" accept=".docx" required>
                    <button type="submit" class="btn btn-primary w-100 rounded-pill">Registrar</button>
                </form>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card shadow-sm border-0 rounded-4">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4">Nombre</th>
                            <th>Categoría</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for p in plantillas %}
                        <tr>
                            <td class="ps-4 fw-bold">{{ p.nombre }}</td>
                            <td>{{ p.categoria.nombre }}</td>
                            <td class="text-center">
                                <a href="{% url 'eliminar_plantilla' p.id %}" class="btn btn-sm btn-outline-danger rounded-circle" onclick="return confirm('¿Borrar plantilla?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
