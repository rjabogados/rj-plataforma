{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Corporativo - RJ Abogados</title>
    
    <link rel="shortcut icon" href="{% static 'img/logo_compacto.png' %}" type="image/png">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Google Fonts Premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --rj-azul: #183D74;
            --rj-azul-oscuro: #0f2647;
        }
        
        body { 
            /* Fondo con la imagen login.webp (fallback a gradiente) */
            background-color: var(--rj-azul-oscuro);
            background-image: 
                linear-gradient(rgba(15, 38, 71, 0.7), rgba(15, 38, 71, 0.9)), 
                url('{% static "img/login.webp" %}');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        /* Efecto Cristal (Glassmorphism) */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 440px; 
            transform: translateY(20px);
            opacity: 0;
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUpFade {
            to { transform: translateY(0); opacity: 1; }
        }

        .form-control {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(24, 61, 116, 0.1);
            border-color: var(--rj-azul);
            background-color: #ffffff;
        }

        .input-group-text {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            color: #64748b;
        }

        .login-logo {
            max-width: 190px;
            height: auto;
            object-fit: contain;
            display: block;
            margin: 0 auto 1.5rem auto;
            transition: transform 0.3s ease;
        }
        
        .login-logo:hover {
            transform: scale(1.02);
        }

        .btn-primary {
            background-color: var(--rj-azul);
            border: none;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: var(--rj-azul-oscuro);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(24, 61, 116, 0.3);
        }
        
        /* Botón de ojito */
        .password-toggle {
            cursor: pointer;
            transition: color 0.2s;
        }
        .password-toggle:hover {
            color: var(--rj-azul) !important;
        }

        .bg-pattern {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 32px 32px;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>

    <div class="container px-3 position-relative z-1 d-flex flex-column align-items-center">
        <div class="card border-0 rounded-4 glass-card mx-auto">
            <div class="card-body p-4 p-md-5">
                
                <div class="text-center mb-4">
                    <img src="{% static 'img/logo_completo.png' %}" alt="Logo RJ Abogados" class="login-logo">
                    <h4 class="fw-bold text-dark mb-1">Intranet Corporativa</h4>
                    <p class="text-muted small mb-0">Gestión de Talento y Operaciones</p>
                </div>

                {% if error %}
                    <div class="alert alert-danger small rounded-3 border-0 fw-semibold d-flex align-items-center mb-4 shadow-sm" role="alert">
                        <i class="bi bi-shield-exclamation fs-5 me-2"></i> 
                        <div>{{ error }}</div>
                    </div>
                {% endif %}

                <form method="POST" action="{% url 'login' %}">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-secondary">Nombre de Usuario</label>
                        <div class="input-group input-group-lg">
                            <span class="input-group-text border-end-0"><i class="bi bi-person"></i></span>
                            <input type="text" name="username" class="form-control border-start-0 ps-0 fs-6" placeholder="Ingresa tu usuario" required autofocus autocomplete="username">
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-secondary">Contraseña</label>
                        <div class="input-group input-group-lg">
                            <span class="input-group-text border-end-0"><i class="bi bi-key"></i></span>
                            <input type="password" name="password" id="passwordInput" class="form-control border-start-0 border-end-0 px-0 fs-6" placeholder="Ingresa tu contraseña" required autocomplete="current-password">
                            <span class="input-group-text bg-white border-start-0 password-toggle" id="togglePassword" title="Mostrar contraseña">
                                <i class="bi bi-eye-slash" id="toggleIcon"></i>
                            </span>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold rounded-pill mt-2">
                        Iniciar Sesión <i class="bi bi-arrow-right-short fs-4 align-middle ms-1"></i>
                    </button>
                </form>

            </div>
        </div>
        
        <div class="text-center mt-5 text-white opacity-75">
            <p class="small mb-0 fw-medium">© {% now "Y" %} RJ Abogados. Todos los derechos reservados.</p>
            <p class="small" style="font-size: 0.7rem;">Plataforma Segura</p>
        </div>
    </div>

    <!-- Script para Mostrar/Ocultar Contraseña -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('passwordInput');
            const toggleIcon = document.getElementById('toggleIcon');

            togglePassword.addEventListener('click', function() {
                // Alternar tipo de input
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                
                // Alternar ícono
                if(type === 'text') {
                    toggleIcon.classList.remove('bi-eye-slash');
                    toggleIcon.classList.add('bi-eye');
                } else {
                    toggleIcon.classList.remove('bi-eye');
                    toggleIcon.classList.add('bi-eye-slash');
                }
            });
        });
    </script>
</body>
</html>
