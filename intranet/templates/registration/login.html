<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RJ Plataforma</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow-lg" style="width: 400px; border-radius: 15px;">
        <div class="card-body p-5">
            <h3 class="text-center fw-bold mb-4">RJ Talent</h3>
            
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-bold">Usuario (DNI)</label>
                    <input type="text" class="form-control" name="username" placeholder="Ingresa tu usuario" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Contraseña</label>
                    <input type="password" class="form-control" name="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Ingresar a la Plataforma</button>
            </form>

            {% if form.errors %}
            <div class="alert alert-danger mt-3 text-center" role="alert">
                Usuario o contraseña incorrectos.
            </div>
            {% endif %}
        </div>
    </div>

</body>
</html>
